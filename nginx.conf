# Nginx configuration for Hostinger VPS Deployment
# Subdomain: pos.taffybd.com

server {
    listen 80;
    server_name pos.taffybd.com;

    # Redirect all HTTP requests to HTTPS (highly recommended for POS / passwords)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pos.taffybd.com;

    # SSL Certificate Configurations (configure paths to your actual Let's Encrypt certificates)
    # ssl_certificate /etc/letsencrypt/live/pos.taffybd.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pos.taffybd.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/log/nginx/pos_access.log;
    error_log /var/log/nginx/pos_error.log;

    # Reverse Proxy to running Node.js Server on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for large sales reports operations
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
